<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>raudio viewer</title>
    <!--
      Resolve theme synchronously before first paint to prevent the brief
      light-flash when the user has explicitly chosen dark mode. Reads
      the stored preference; falls back to system `prefers-color-scheme`.
    -->
    <script>
      (function () {
        try {
          const stored = localStorage.getItem('raudio-theme');
          const dark = stored === 'dark' || (!stored && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
